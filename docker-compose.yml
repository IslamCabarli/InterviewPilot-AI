services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: interviewpilot
      POSTGRES_USER: interviewpilot
      POSTGRES_PASSWORD: secret
    ports:
          # 5433 istifadə olunur, çünki Windows-da lokal Postgres servisi 5432-ni tutur
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: interviewpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: